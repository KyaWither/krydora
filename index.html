<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Krydora — NPC Compendium</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0b08;font-family:Georgia,serif;min-height:100vh;color:#c9b89a;}

.nav{display:flex;align-items:stretch;background:#111009;border-bottom:0.5px solid #2a2318;overflow-x:auto;}
.nav-title{font-size:16px;color:#e8dcc8;letter-spacing:0.05em;padding:0 20px;display:flex;align-items:center;border-right:0.5px solid #2a2318;white-space:nowrap;flex-shrink:0;}
.nav-tab{font-size:11px;color:#5a5040;text-transform:uppercase;letter-spacing:0.08em;padding:16px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:color 0.15s;user-select:none;}
.nav-tab:hover{color:#9a8468;}
.nav-tab.active{color:#c9b89a;border-bottom-color:#7F77DD;}

.toolbar{display:flex;align-items:center;gap:8px;padding:10px 20px;background:#111009;border-bottom:0.5px solid #1e1a14;}
.toolbar-info{flex:1;font-size:11px;color:#3d3328;text-transform:uppercase;letter-spacing:0.1em;}
.btn{font-size:11px;text-transform:uppercase;letter-spacing:0.07em;padding:5px 13px;border-radius:20px;cursor:pointer;font-family:Georgia,serif;border:0.5px solid;transition:all 0.15s;background:none;}
.btn-edit{color:#6b5a3e;border-color:#3d3328;}
.btn-edit:hover{color:#9a8468;border-color:#5a4a30;}
.btn-edit.active{color:#CECBF6;border-color:#534AB7;background:#1e1a4a;}
.btn-save{color:#9FE1CB;border-color:#0F6E56;background:#04342C;display:none;}
.btn-save.visible{display:block;}
.hint-bar{padding:6px 20px;font-size:11px;color:#2e2818;font-family:monospace;background:#111009;border-bottom:0.5px solid #191510;min-height:28px;}

.npc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));border-left:0.5px solid #2a2318;border-top:0.5px solid #2a2318;}

.card{position:relative;aspect-ratio:3/4;overflow:hidden;border-right:0.5px solid #2a2318;border-bottom:0.5px solid #2a2318;cursor:pointer;background:#0d0b08;}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center center;transform-origin:center center;user-select:none;-webkit-user-drag:none;pointer-events:none;will-change:transform;}
.card:not(.edit-mode):hover .card-img{filter:brightness(1.1);}

.name-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(8,6,4,0.93) 50%);padding:36px 8px 9px;pointer-events:none;z-index:1;transition:opacity 0.2s;}
.card.edit-mode .name-bar{opacity:0;}
.npc-name{font-size:12px;color:#c9b89a;text-align:center;display:block;letter-spacing:0.02em;}
.npc-role{font-size:10px;color:#5a4a30;text-align:center;display:block;margin-top:2px;text-transform:uppercase;letter-spacing:0.07em;}

.edit-ring{position:absolute;inset:0;border:1.5px solid #7F77DD;pointer-events:none;opacity:0;z-index:2;transition:opacity 0.15s;}
.card.edit-mode .edit-ring{opacity:1;}
.edit-tip{position:absolute;top:7px;left:50%;transform:translateX(-50%);font-size:10px;color:#CECBF6;background:rgba(30,26,74,0.92);padding:3px 9px;border-radius:20px;white-space:nowrap;pointer-events:none;opacity:0;z-index:3;transition:opacity 0.15s;}
.card.edit-mode .edit-tip{opacity:1;}

.zoom-row{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;background:rgba(10,8,5,0.92);padding:4px 9px;border-radius:20px;opacity:0;pointer-events:none;z-index:3;white-space:nowrap;transition:opacity 0.15s;}
.card.edit-mode .zoom-row{opacity:1;pointer-events:all;}
.zoom-row span{font-size:10px;color:#4a3a28;}
.zoom-row input[type=range]{-webkit-appearance:none;width:80px;height:2px;background:#3d3328;border-radius:2px;outline:none;cursor:pointer;}
.zoom-row input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#7F77DD;cursor:pointer;}
.zoom-val{font-size:10px;color:#5a5040;font-family:monospace;min-width:30px;}

.lb{display:none;position:fixed;inset:0;background:rgba(6,5,3,0.97);z-index:200;flex-direction:column;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb img{max-width:90vw;max-height:84vh;object-fit:contain;border-radius:3px;}
.lb-name{font-size:14px;color:#c9b89a;margin-top:14px;letter-spacing:0.04em;}
.lb-role{font-size:10px;color:#5a4a30;margin-top:3px;text-transform:uppercase;letter-spacing:0.08em;}
.lb-close{position:fixed;top:18px;right:22px;font-size:24px;color:#3d3328;background:none;border:none;cursor:pointer;font-family:sans-serif;line-height:1;}
.lb-close:hover{color:#c9b89a;}

.empty-msg{padding:40px;color:#3d3328;font-size:13px;font-style:italic;grid-column:1/-1;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-title">Krydora</div>
  <div class="nav-tab active"  onclick="switchTab(this,'circus')">Circus Arc</div>
  <div class="nav-tab" onclick="switchTab(this,'pyth')">Pyth</div>
  <div class="nav-tab" onclick="switchTab(this,'thaldarinwood')">Thaldarinwood</div>
  <div class="nav-tab" onclick="switchTab(this,'burrow')">Bizarre Burrow</div>
  <div class="nav-tab" onclick="switchTab(this,'seers')">Seers Exiles</div>
  <div class="nav-tab" onclick="switchTab(this,'party')">The Party</div>
</div>

<div class="toolbar">
  <span class="toolbar-info" id="toolbarInfo"></span>
  <button class="btn btn-edit" id="btnEdit" onclick="toggleEdit()">Edit crops</button>
  <button class="btn btn-save" id="btnSave" onclick="saveAll()">Save</button>
</div>
<div class="hint-bar" id="hintBar">click any portrait to view the full image</div>
<div class="npc-grid" id="grid"></div>

<div class="lb" id="lb">
  <button class="lb-close" onclick="closeLb()">&#x2715;</button>
  <img id="lbImg" src="" alt=""/>
  <div class="lb-name" id="lbName"></div>
  <div class="lb-role" id="lbRole"></div>
</div>

<script>
// ─────────────────────────────────────────────
//  NPC DATA — add your NPCs here
//  src: path to image file relative to index.html
//  tx/ty: pan offset in px (0,0 = centered)
//  z: zoom (1 = fit whole image in card)
// ─────────────────────────────────────────────
const sections = {
  circus: [
    { name:"Dio Torrent",       role:"Ringmaster", src:"images/Dio Torrent art.jpg",        tx:0, ty:0, z:1 },
    { name:"Hila the Punisher", role:"Enforcer",   src:"images/Hila The Punisher art.png",  tx:0, ty:0, z:1 },
    { name:"Bingo",             role:"Jester",     src:"images/Bingo art.jpg",               tx:0, ty:0, z:1 },
  ],
  pyth:         [],
  thaldarinwood:[],
  burrow:       [],
  seers:        [],
  party:        [],
};

// ─────────────────────────────────────────────
//  ENGINE — no need to edit below this line
// ─────────────────────────────────────────────
let currentSection = 'circus';
let editMode = false;
let drag = null;

function render() {
  const npcs = sections[currentSection];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('toolbarInfo').textContent =
    npcs.length + ' entr' + (npcs.length === 1 ? 'y' : 'ies');

  if (npcs.length === 0) {
    grid.innerHTML = '<div class="empty-msg">No NPCs in this section yet.</div>';
    return;
  }

  npcs.forEach((npc, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (editMode ? ' edit-mode' : '');
    card.dataset.i = i;
    card.style.cursor = editMode ? 'grab' : 'pointer';
    card.innerHTML = `
      <img class="card-img" id="ci${i}" src="${npc.src}" draggable="false"/>
      <div class="edit-ring"></div>
      <div class="edit-tip">drag to pan &nbsp;·&nbsp; scroll or slider to zoom</div>
      <div class="zoom-row">
        <span>zoom</span>
        <input type="range" id="zs${i}" min="0.1" max="5" step="0.01" value="${npc.z}"
          oninput="onZoom(${i},+this.value)" onmousedown="event.stopPropagation()"/>
        <span class="zoom-val" id="zv${i}">${npc.z.toFixed(2)}x</span>
      </div>
      <div class="name-bar">
        <span class="npc-name">${npc.name}</span>
        <span class="npc-role">${npc.role}</span>
      </div>`;
    card.addEventListener('mousedown', onMouseDown);
    card.addEventListener('click', onClick);
    card.addEventListener('wheel', onWheel, {passive:false});
    grid.appendChild(card);
    applyT(i);
  });
}

function applyT(i) {
  const img = document.getElementById('ci'+i);
  if (!img) return;
  const n = sections[currentSection][i];
  img.style.transform = `translate(${n.tx.toFixed(1)}px,${n.ty.toFixed(1)}px) scale(${n.z.toFixed(4)})`;
  const zv = document.getElementById('zv'+i);
  const zs = document.getElementById('zs'+i);
  if (zv) zv.textContent = n.z.toFixed(2)+'x';
  if (zs) zs.value = n.z;
}

function hint(msg) { document.getElementById('hintBar').textContent = msg; }

function onMouseDown(e) {
  if (!editMode || e.target.tagName==='INPUT') return;
  e.preventDefault();
  const i = +e.currentTarget.dataset.i;
  const n = sections[currentSection][i];
  drag = {i, startX:e.clientX, startY:e.clientY, startTx:n.tx, startTy:n.ty};
  e.currentTarget.style.cursor = 'grabbing';
}

document.addEventListener('mousemove', e => {
  if (!drag) return;
  const n = sections[currentSection][drag.i];
  n.tx = drag.startTx + (e.clientX - drag.startX);
  n.ty = drag.startTy + (e.clientY - drag.startY);
  applyT(drag.i);
  hint(n.name + '  pan: '+n.tx.toFixed(0)+'px, '+n.ty.toFixed(0)+'px  zoom: '+n.z.toFixed(2)+'x');
});

document.addEventListener('mouseup', () => {
  if (!drag) return;
  const card = document.querySelector('.card[data-i="'+drag.i+'"]');
  if (card) card.style.cursor = 'grab';
  drag = null;
});

function onWheel(e) {
  if (!editMode) return;
  e.preventDefault();
  const i = +e.currentTarget.dataset.i;
  const n = sections[currentSection][i];
  n.z = Math.max(0.05, Math.min(5, n.z + (e.deltaY < 0 ? 0.06 : -0.06)));
  applyT(i);
  hint(n.name + '  zoom: '+n.z.toFixed(2)+'x');
}

function onZoom(i, val) {
  sections[currentSection][i].z = val;
  applyT(i);
}

function onClick(e) {
  if (editMode) return;
  const i = +e.currentTarget.dataset.i;
  const n = sections[currentSection][i];
  document.getElementById('lbImg').src = n.src;
  document.getElementById('lbName').textContent = n.name;
  document.getElementById('lbRole').textContent = n.role;
  document.getElementById('lb').classList.add('open');
}
function closeLb() { document.getElementById('lb').classList.remove('open'); }
document.getElementById('lb').addEventListener('click', e => { if(e.target===e.currentTarget) closeLb(); });

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('btnEdit').classList.toggle('active', editMode);
  document.getElementById('btnSave').classList.toggle('visible', editMode);
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('edit-mode', editMode);
    c.style.cursor = editMode ? 'grab' : 'pointer';
  });
  hint(editMode
    ? 'drag to pan  ·  scroll or slider to zoom  ·  hit Save when done'
    : 'click any portrait to view the full image');
}

function saveAll() {
  hint('positions saved!');
  toggleEdit();
}

function switchTab(el, key) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentSection = key;
  editMode = false;
  document.getElementById('btnEdit').classList.remove('active');
  document.getElementById('btnSave').classList.remove('visible');
  render();
  hint(sections[key].length === 0
    ? 'no NPCs in this section yet'
    : 'click any portrait to view the full image');
}

render();
</script>
</body>
</html>
